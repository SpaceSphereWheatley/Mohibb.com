<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

:root{
  --bg:#0A0D12;
  --surface:#11151C;
  --surface2:#161C26;
  --border:#232A36;
  --border-soft:#1A2029;
  --text:#E7ECF2;
  --muted:#8B96A8;
  --muted2:#5C6577;
  --profit:#3ECF8E;
  --loss:#FF5C6C;
  --accent:#5B8CFF;
  --warn:#F5A623;
  --font-display:'Space Grotesk',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,monospace;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  background:
    radial-gradient(1200px 600px at 100% -10%, rgba(91,140,255,0.08), transparent 60%),
    var(--bg);
  color:var(--text);
  font-family:var(--font-mono);
  padding:32px 24px 80px;
  min-height:100vh;
}

.wrap{max-width:1180px;margin:0 auto;}

header{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  flex-wrap:wrap;
  gap:16px;
  border-bottom:1px solid var(--border);
  padding-bottom:20px;
  margin-bottom:28px;
}
.title-block h1{font-family:var(--font-display);font-weight:700;font-size:28px;letter-spacing:-0.02em;}
.title-block .sub{color:var(--muted);font-size:13px;margin-top:4px;}
.status{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--muted);}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted2);}
.dot.live{background:var(--profit);box-shadow:0 0 8px var(--profit);}
.dot.err{background:var(--loss);box-shadow:0 0 8px var(--loss);}
#refreshBtn{
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  font-family:var(--font-mono);font-size:12px;padding:8px 14px;border-radius:6px;
  cursor:pointer;transition:border-color .15s;
}
#refreshBtn:hover{border-color:var(--accent);}
#refreshBtn:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
#refreshBtn:disabled{opacity:.5;cursor:default;}

.errorBanner{
  display:none;background:rgba(255,92,108,0.08);border:1px solid rgba(255,92,108,0.35);
  color:var(--loss);border-radius:8px;padding:14px 16px;font-size:13px;
  margin-bottom:24px;line-height:1.5;
}
.errorBanner.show{display:block;}
.errorBanner a{color:var(--loss);}

section{margin-bottom:36px;}
.section-label{
  font-family:var(--font-display);font-size:13px;font-weight:600;letter-spacing:0.08em;
  text-transform:uppercase;color:var(--muted);margin-bottom:14px;
  display:flex;align-items:center;gap:10px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--border-soft);}

/* KPI grid */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;}
.kpi .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
.kpi .value{font-size:22px;font-weight:600;margin-top:6px;font-variant-numeric:tabular-nums;}
.kpi .sub{font-size:11px;color:var(--muted2);margin-top:4px;}
.pos{color:var(--profit);}
.neg{color:var(--loss);}

/* Hero */
.hero{
  background:linear-gradient(135deg, rgba(91,140,255,0.07), rgba(62,207,142,0.03));
  border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:12px;padding:24px 26px;
}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px;margin-bottom:20px;}
.hero-match{font-family:var(--font-display);font-size:22px;font-weight:600;}
.hero-meta{font-size:12px;color:var(--muted);margin-top:6px;}
.hero-countdown{
  font-family:var(--font-mono);font-size:13px;background:var(--surface2);
  border:1px solid var(--border);border-radius:6px;padding:8px 14px;color:var(--warn);
}
.legs{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;}
.leg{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;}
.leg .out{font-size:11px;color:var(--muted);text-transform:uppercase;}
.leg .odds{font-family:var(--font-display);font-size:18px;font-weight:600;margin-top:4px;}
.leg .row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted2);margin-top:8px;}
.leg .row span:last-child{color:var(--text);}

/* Table */
table{width:100%;border-collapse:collapse;font-size:12.5px;}
th{
  text-align:left;color:var(--muted);font-weight:500;font-size:11px;text-transform:uppercase;
  letter-spacing:.04em;padding:8px 12px;border-bottom:1px solid var(--border);
}
td{padding:9px 12px;border-bottom:1px solid var(--border-soft);}
tr:last-child td{border-bottom:none;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.03em;}
.badge.won{background:rgba(62,207,142,.12);color:var(--profit);}
.badge.lost{background:rgba(255,92,108,.12);color:var(--loss);}
.badge.open{background:rgba(245,166,35,.12);color:var(--warn);}
.arb-tag{
  font-size:9px;padding:1px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:.04em;
  background:rgba(91,140,255,.15);color:var(--accent);margin-right:5px;vertical-align:middle;
}

/* Period filter */
.period-filter-row{
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;
  gap:12px;margin-bottom:14px;
}
.period-filter-row .pf-label{font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:.06em;}
.period-bar{display:flex;gap:6px;flex-wrap:wrap;}
.period-btn{
  background:var(--surface2);border:1px solid var(--border);color:var(--muted);
  font-family:var(--font-mono);font-size:11px;padding:4px 10px;border-radius:4px;
  cursor:pointer;transition:border-color .12s,color .12s;
}
.period-btn:hover{color:var(--text);border-color:var(--muted);}
.period-btn.active{color:var(--accent);border-color:var(--accent);}

/* Two-column layout */
.grid2{display:grid;grid-template-columns:1.3fr 1fr;gap:20px;}
@media(max-width:860px){.grid2{grid-template-columns:1fr;}}

/* Country bars */
.bar-row{display:flex;align-items:center;gap:12px;padding:8px 16px;}
.bar-row .name{width:110px;font-size:12px;flex-shrink:0;}
.bar-track{flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;}
.bar-fill.pos{background:var(--profit);}
.bar-fill.neg{background:var(--loss);}
.bar-row .val{width:130px;text-align:right;font-size:12px;font-variant-numeric:tabular-nums;flex-shrink:0;}
.bar-row .cnt{width:36px;text-align:right;color:var(--muted2);font-size:11px;flex-shrink:0;}

/* Odds diverging chart */
.odds-chart{display:flex;gap:8px;padding:16px;height:200px;}
.odds-col{flex:1;display:flex;flex-direction:column;align-items:center;}
.zone-pos{height:90px;width:100%;display:flex;align-items:flex-end;justify-content:center;}
.zone-neg{height:90px;width:100%;display:flex;align-items:flex-start;justify-content:center;}
.odds-bar{width:65%;min-height:2px;}
.odds-bar.pos{background:var(--profit);border-radius:3px 3px 0 0;}
.odds-bar.neg{background:var(--loss);border-radius:0 0 3px 3px;}
.zeroline{width:100%;height:1px;background:var(--border);}
.odds-label{font-size:11px;color:var(--muted);margin-top:8px;text-align:center;}
.odds-val{font-size:10px;color:var(--muted2);margin-top:2px;}

/* Misc */
.misc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;padding:16px;}
.misc-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;}
.misc-item .k{font-size:11px;color:var(--muted);text-transform:uppercase;}
.misc-item .v{font-size:16px;font-weight:600;margin-top:4px;}

footer{margin-top:40px;padding-top:20px;border-top:1px solid var(--border-soft);font-size:11px;color:var(--muted2);line-height:1.6;}
.skeleton{color:var(--muted2);font-size:12px;padding:20px;text-align:center;}
</style>

<script>
const SHEET_ID = '1_DRVnfGEwIajn_3eTKH6A7W_MgfTIGTn-wZzDJFCTVY';
const GIDS = { main: '1619776881', bets: '2076253557', open: '992602483' };

const ODD_BRACKETS = [
  { label: '< 1.3',   min: 0,   max: 1.3 },
  { label: '1.3–1.5', min: 1.3, max: 1.5 },
  { label: '1.5–1.8', min: 1.5, max: 1.8 },
  { label: '1.8–2.2', min: 1.8, max: 2.2 },
  { label: '2.2–3.0', min: 2.2, max: 3.0 },
  { label: '3.0–5.0', min: 3.0, max: 5.0 },
  { label: '5.0+',    min: 5.0, max: Infinity },
];

let globalBets = [];
let globalMatchLookup = {};
let currentPeriod = 'all';

/* ── utils ── */
function csvUrl(gid){
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${gid}`;
}

function parseCSV(str){
  const rows = [];
  let row = [], field = '', inQ = false;
  for (let i = 0; i < str.length; i++){
    const c = str[i];
    if (inQ){
      if (c === '"'){ if (str[i+1] === '"'){ field += '"'; i++; } else inQ = false; }
      else field += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (c !== '\r') field += c;
    }
  }
  if (field || row.length) { row.push(field); rows.push(row); }
  return rows;
}

function getCell(rows, r, c){
  return (rows[r] && rows[r][c] !== undefined) ? rows[r][c].trim() : '';
}

function parseKr(str){
  if (!str) return 0;
  const n = parseFloat(String(str).replace(/kr/gi,'').replace(/,/g,'').replace(/%/g,'').trim());
  return isNaN(n) ? 0 : n;
}

function fmtKr(num){
  if (num === null || num === undefined || isNaN(num)) return '—';
  const sign = num < 0 ? '-' : '';
  return `${sign}kr ${Math.abs(num).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
}

function parseDate(str){
  if (!str) return null;
  if (/^\d{4}-\d{2}-\d{2}/.test(str)) return new Date(str.substring(0, 10));
  const m = str.match(/^(\d{1,2})[.\/\-](\d{1,2})[.\/\-](\d{4})/);
  if (m) return new Date(+m[3], +m[2]-1, +m[1]);
  const d = new Date(str);
  return isNaN(d) ? null : d;
}

async function fetchSheet(gid){
  const res = await fetch(csvUrl(gid));
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return parseCSV(await res.text());
}

/* ── column detection for Bets tab ── */
function buildColMap(headerRow){
  const m = {};
  headerRow.forEach((h, i) => { m[h.trim().toLowerCase()] = i; });
  return m;
}

function findCol(map, ...keys){
  for (const k of keys) if (map[k.toLowerCase()] !== undefined) return map[k.toLowerCase()];
  return -1;
}

/* ── period filter ── */
function filterBets(bets, period){
  if (period === 'all') return bets;
  let cutoff;
  const now = new Date();
  if (period === 'ytd') { cutoff = new Date(now.getFullYear(), 0, 1); }
  else if (period === '6m') { cutoff = new Date(); cutoff.setMonth(cutoff.getMonth() - 6); }
  else if (period === '30d') { cutoff = new Date(Date.now() - 30 * 86400000); }
  return bets.filter(b => b.date && b.date >= cutoff);
}

/* ── parsers ── */
function parseMain(rows){
  const row1text = (rows[0] || []).join(' ');
  const totalMatch = row1text.match(/Total:\s*kr\s*([\d,.\s]+?)(?:\s{2,}|Available)/i);
  const availMatch = row1text.match(/Available:\s*kr:?\s*([\d,.\s]+)/i);
  const totalFunds = totalMatch ? parseKr(totalMatch[1]) : null;
  const availFunds = availMatch ? parseKr(availMatch[1]) : null;
  const sak = getCell(rows,98,0);
  const tittel = getCell(rows,98,1);
  const blocks = [];
  for (let r = 98; r <= 99; r++){
    const blokk = getCell(rows,r,6);
    if (blokk) blocks.push({ blokk, solgt: getCell(rows,r,7), ledige: getCell(rows,r,8) });
  }
  return { totalFunds, availFunds, sak, tittel, blocks };
}

function parseBets(rows){
  if (rows.length < 2) return { bets: [], lastROI: null };

  const cm = buildColMap(rows[0]);
  const fc = (...keys) => findCol(cm, ...keys);

  const dateCol    = fc('date','dato','event date','match date','bet date');
  const stakeCol   = fc('stake','amount','innskudd','bet amount','wager');
  const oddsCol    = fc('odds','price','decimal odds');
  const selCol     = fc('selection','bet type','outcome','type','tip');
  const matchCol   = fc('match','match ref','match id','match number','matchref','event','game');
  const homeCol    = fc('home','home team','hjemme','home side');
  const awayCol    = fc('away','away team','borte','away side');
  const finCol     = fc('finished','settled','concluded','done','complete');
  const winCol     = fc('win','won','winner','correct');
  const profitCol  = fc('profit','p/l','pnl','net','return','gain');
  const roiCol     = fc('roi','cumulative roi','cum roi','running roi','total roi');
  const COUNTRY_COL = 15;
  const ARB_ID_COL  = 17;

  const bets = [];
  let lastROI = null;

  for (let r = 1; r < rows.length; r++){
    const row = rows[r];
    if (!(row[0] || '').trim()) continue;

    const finished  = (row[finCol] || '').trim().toUpperCase() === 'TRUE';
    const win       = (row[winCol] || '').trim().toUpperCase() === 'TRUE';
    const profit    = profitCol >= 0 ? parseKr(row[profitCol]) : 0;
    const roiStr    = roiCol >= 0 ? (row[roiCol] || '').trim() : '';
    if (roiStr) lastROI = roiStr;

    const rawCountry = (row[COUNTRY_COL] || '').trim();
    const countries  = rawCountry
      ? rawCountry.split(',').map(s => s.trim()).filter(Boolean)
      : [];

    const arbId    = (row[ARB_ID_COL] || '').trim();
    const date     = dateCol >= 0 ? parseDate(row[dateCol]) : null;
    const stake    = stakeCol >= 0 ? parseKr(row[stakeCol]) : 0;
    const odds     = oddsCol >= 0 ? (parseFloat(row[oddsCol]) || 0) : 0;
    const selection = selCol >= 0 ? (row[selCol] || '').trim() : '';
    const matchRef  = matchCol >= 0 ? (row[matchCol] || '').trim() : '';
    const home      = homeCol >= 0 ? (row[homeCol] || '').trim() : '';
    const away      = awayCol >= 0 ? (row[awayCol] || '').trim() : '';

    bets.push({ date, stake, odds, selection, matchRef, home, away, finished, win, profit, countries, arbId });
  }

  return { bets, lastROI };
}

function parseOpenBets(rows){
  const summaryText = (rows[0] || []).join(' ');
  const m = summaryText.match(/Wins\/conluded:\s*(\d+)\/(\d+)\s*\((\d+)%\)\s*Open Bets:\s*(\d+)\s*Due today:\s*(\d+)/i);
  const summary = m ? { wins:+m[1], concluded:+m[2], pct:+m[3], open:+m[4], dueToday:+m[5] } : null;

  const matchLookup = {};
  for (let r = 2; r < rows.length; r++){
    const key = getCell(rows,r,9);
    if (key) matchLookup[key] = {
      league: getCell(rows,r,12),
      home:   getCell(rows,r,13),
      away:   getCell(rows,r,14),
      result: getCell(rows,r,18)
    };
  }

  const outcomeHeader = [getCell(rows,25,1), getCell(rows,25,2), getCell(rows,25,3)];
  const atRisk     = [getCell(rows,26,1), getCell(rows,26,2), getCell(rows,26,3)].map(parseKr);
  const potential  = [getCell(rows,27,1), getCell(rows,27,2), getCell(rows,27,3)].map(parseKr);
  const oddsRow    = [getCell(rows,28,1), getCell(rows,28,2), getCell(rows,28,3)].map(v => parseFloat(v) || 0);
  const chance     = [getCell(rows,29,1), getCell(rows,29,2), getCell(rows,29,3)];
  const roiRow     = [getCell(rows,30,1), getCell(rows,30,2), getCell(rows,30,3)];
  const matchName  = getCell(rows,31,0);
  const maxDays    = getCell(rows,26,7);
  const nextMatch  = getCell(rows,23,10);
  const stakeTotal = parseKr(getCell(rows,23,5));
  const profitTotal= parseKr(getCell(rows,23,6));
  const roiTotal   = getCell(rows,23,7);

  return { summary, matchLookup, outcomeHeader, atRisk, potential, oddsRow, chance, roiRow, matchName, maxDays, nextMatch, stakeTotal, profitTotal, roiTotal };
}

/* ── computation ── */
function computeKPIs(bets){
  let arbProfit = 0, nonArbProfit = 0, wins = 0, finished = 0;
  bets.forEach(b => {
    if (!b.finished) return;
    finished++;
    if (b.win) wins++;
    if (b.arbId) arbProfit += b.profit;
    else nonArbProfit += b.profit;
  });
  return {
    arbProfit, nonArbProfit,
    totalProfit: arbProfit + nonArbProfit,
    winRate: finished > 0 ? wins / finished * 100 : 0,
    wins, finished, totalBets: bets.length
  };
}

function computeByCountry(bets){
  const map = {};
  bets.forEach(b => {
    if (!b.finished || !b.countries.length) return;
    const share = b.profit / b.countries.length;
    b.countries.forEach(c => {
      if (!map[c]) map[c] = { profit: 0, count: 0 };
      map[c].profit += share;
      map[c].count++;
    });
  });
  return Object.entries(map)
    .map(([country, d]) => ({ country, profit: d.profit, count: d.count }))
    .sort((a, b) => b.profit - a.profit);
}

function computeByOdds(bets){
  const brackets = ODD_BRACKETS.map(b => ({ ...b, value: 0, count: 0 }));
  bets.forEach(b => {
    if (!b.finished || !b.odds) return;
    const br = brackets.find(br => b.odds >= br.min && b.odds < br.max);
    if (br) { br.value += b.profit; br.count++; }
  });
  return brackets.filter(b => b.count > 0);
}

/* ── recent bets grouping ── */
function buildArbGroups(bets){
  const sorted = [...bets].sort((a, b) => {
    if (!a.date && !b.date) return 0;
    if (!a.date) return 1;
    if (!b.date) return -1;
    return b.date - a.date;
  });

  const groups = [];
  const arbMap = {};

  for (const bet of sorted){
    if (bet.arbId){
      if (!arbMap[bet.arbId]){
        const g = { type: 'arb', arbId: bet.arbId, legs: [], date: bet.date, matchRef: bet.matchRef, home: bet.home, away: bet.away };
        arbMap[bet.arbId] = g;
        groups.push(g);
      }
      arbMap[bet.arbId].legs.push(bet);
    } else {
      groups.push({ type: 'single', ...bet });
    }
  }
  return groups;
}

function matchName(home, away, matchRef, lookup){
  if (home && away) return `${home} vs ${away}`;
  const m = lookup[matchRef];
  if (m && m.home) return `${m.home} vs ${m.away}`;
  return matchRef || '—';
}

function fmtDate(d){
  if (!d) return '—';
  return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short' });
}

/* ── renderers ── */
function renderKPIs(main, computed, lastROI){
  const el = document.getElementById('kpiGrid');
  const roiClass = (lastROI || '').includes('-') ? 'neg' : 'pos';
  el.innerHTML = `
    <div class="kpi"><div class="label">Total Funds</div><div class="value">${fmtKr(main.totalFunds)}</div></div>
    <div class="kpi"><div class="label">Available</div><div class="value">${fmtKr(main.availFunds)}</div></div>
    <div class="kpi"><div class="label">Arbitrage Profit</div>
      <div class="value ${computed.arbProfit>=0?'pos':'neg'}">${fmtKr(computed.arbProfit)}</div>
      <div class="sub">vs ${fmtKr(computed.nonArbProfit)} non-arb</div></div>
    <div class="kpi"><div class="label">Total Profit</div>
      <div class="value ${computed.totalProfit>=0?'pos':'neg'}">${fmtKr(computed.totalProfit)}</div></div>
    <div class="kpi"><div class="label">Bet Win Rate</div>
      <div class="value">${computed.winRate.toFixed(1)}%</div>
      <div class="sub">${computed.wins}/${computed.finished} finished</div></div>
    <div class="kpi"><div class="label">Latest ROI (cumulative)</div>
      <div class="value ${roiClass}">${lastROI || '—'}</div>
      <div class="sub">from most recent bet row</div></div>
  `;
}

function renderHero(open){
  const el = document.getElementById('heroSection');
  if (!open.matchName){ el.innerHTML = `<div class="skeleton">No open position found.</div>`; return; }
  const legs = open.outcomeHeader.map((label,i) => `
    <div class="leg">
      <div class="out">${label || '—'}</div>
      <div class="odds">${open.oddsRow[i] ?? '—'}</div>
      <div class="row"><span>At risk</span><span>${fmtKr(open.atRisk[i])}</span></div>
      <div class="row"><span>Potential</span><span>${fmtKr(open.potential[i])}</span></div>
      <div class="row"><span>Chance</span><span>${open.chance[i] || '—'}</span></div>
      <div class="row"><span>ROI</span><span>${open.roiRow[i] || '—'}</span></div>
    </div>`).join('');
  el.innerHTML = `
    <div class="hero-top">
      <div>
        <div class="hero-match">${open.matchName}</div>
        <div class="hero-meta">
          ${open.summary ? `Wins/concluded: ${open.summary.wins}/${open.summary.concluded} (${open.summary.pct}%) · Open bets: ${open.summary.open} · Due today: ${open.summary.dueToday}` : ''}
        </div>
      </div>
      <div class="hero-countdown">${open.nextMatch || '—'}</div>
    </div>
    <div class="legs">${legs}</div>
    <div class="hero-meta" style="margin-top:16px;">
      Stake at risk: ${fmtKr(open.stakeTotal)} · Expected profit: ${fmtKr(open.profitTotal)} (${open.roiTotal || '—'}) · Max days to conclude: ${open.maxDays || '—'}
    </div>`;
}

function renderRecent(bets, lookup){
  const el = document.getElementById('recentCard');
  if (!bets.length){ el.innerHTML = `<div class="skeleton">No bets found.</div>`; return; }

  const groups = buildArbGroups(bets).slice(0, 25);

  const rows = groups.map(g => {
    if (g.type === 'arb'){
      const totalStake  = g.legs.reduce((s, b) => s + b.stake, 0);
      const totalProfit = g.legs.reduce((s, b) => s + b.profit, 0);
      const allFinished = g.legs.every(b => b.finished);
      const selections  = g.legs.map(b => b.selection || '?').join(' / ');
      const name        = matchName(g.home, g.away, g.matchRef, lookup);
      const badge       = !allFinished
        ? `<span class="badge open">Open</span>`
        : totalProfit >= 0 ? `<span class="badge won">Won</span>` : `<span class="badge lost">Lost</span>`;
      const pc = allFinished ? (totalProfit >= 0 ? 'pos' : 'neg') : '';
      return `<tr>
        <td><span class="arb-tag">ARB</span>${name}</td>
        <td>${selections}</td>
        <td style="color:var(--muted2)">—</td>
        <td>${fmtKr(totalStake)}</td>
        <td class="${pc}">${allFinished ? fmtKr(totalProfit) : '—'}</td>
        <td>${badge}</td>
        <td style="color:var(--muted2)">${fmtDate(g.date)}</td>
      </tr>`;
    } else {
      const name  = matchName(g.home, g.away, g.matchRef, lookup);
      const badge = !g.finished
        ? `<span class="badge open">Open</span>`
        : g.profit >= 0 ? `<span class="badge won">Won</span>` : `<span class="badge lost">Lost</span>`;
      const pc = g.finished ? (g.profit >= 0 ? 'pos' : 'neg') : '';
      return `<tr>
        <td>${name}</td>
        <td>${g.selection || '—'}</td>
        <td>${g.odds || '—'}</td>
        <td>${fmtKr(g.stake)}</td>
        <td class="${pc}">${g.finished ? fmtKr(g.profit) : '—'}</td>
        <td>${badge}</td>
        <td style="color:var(--muted2)">${fmtDate(g.date)}</td>
      </tr>`;
    }
  }).join('');

  el.innerHTML = `<table>
    <thead><tr><th>Match</th><th>Selection</th><th>Odds</th><th>Stake</th><th>Profit</th><th>Status</th><th>Date</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderCountries(countries){
  const el = document.getElementById('countryCard');
  if (!countries.length){ el.innerHTML = `<div class="skeleton">No country data for this period.</div>`; return; }
  const maxAbs = Math.max(...countries.map(c => Math.abs(c.profit)), 1);
  const total  = countries.reduce((s, c) => s + c.profit, 0);
  const rows   = countries.map(c => `
    <div class="bar-row">
      <div class="name">${c.country}</div>
      <div class="bar-track"><div class="bar-fill ${c.profit>=0?'pos':'neg'}" style="width:${Math.abs(c.profit)/maxAbs*100}%"></div></div>
      <div class="val ${c.profit>=0?'pos':'neg'}">${fmtKr(c.profit)}</div>
      <div class="cnt">${c.count}×</div>
    </div>`).join('');
  el.innerHTML = rows + `
    <div class="bar-row" style="border-top:1px solid var(--border);margin-top:4px;padding-top:12px;">
      <div class="name" style="font-weight:600;">Total</div>
      <div class="bar-track" style="visibility:hidden;"></div>
      <div class="val ${total>=0?'pos':'neg'}" style="font-weight:600;">${fmtKr(total)}</div>
      <div class="cnt"></div>
    </div>`;
}

function renderOddsChart(brackets){
  const el = document.getElementById('oddsCard');
  if (!brackets.length){ el.innerHTML = `<div class="skeleton">No odds data for this period.</div>`; return; }
  const maxAbs = Math.max(...brackets.map(o => Math.abs(o.value)), 1);
  const cols = brackets.map(o => {
    const h = (Math.abs(o.value) / maxAbs * 90).toFixed(0);
    const posBar = o.value >= 0 ? `<div class="odds-bar pos" style="height:${h}px"></div>` : '';
    const negBar = o.value < 0 ? `<div class="odds-bar neg" style="height:${h}px"></div>` : '';
    return `<div class="odds-col">
      <div class="zone-pos">${posBar}</div>
      <div class="zeroline"></div>
      <div class="zone-neg">${negBar}</div>
      <div class="odds-label">${o.label}</div>
      <div class="odds-val ${o.value>=0?'pos':'neg'}">${fmtKr(o.value)}</div>
    </div>`;
  }).join('');
  el.innerHTML = `<div class="odds-chart">${cols}</div>`;
}

function renderMisc(main){
  const el = document.getElementById('miscCard');
  const items = [];
  if (main.sak) items.push({ k: 'Sak', v: main.sak });
  if (main.tittel) items.push({ k: 'Tittel', v: main.tittel });
  main.blocks.forEach(b => items.push({ k: `Blokk ${b.blokk}`, v: `${b.solgt} · ${b.ledige} ledige` }));
  if (!items.length){ el.innerHTML = `<div class="skeleton">No data found.</div>`; return; }
  el.innerHTML = `<div class="misc-grid">${items.map(i =>
    `<div class="misc-item"><div class="k">${i.k}</div><div class="v">${i.v}</div></div>`
  ).join('')}</div>`;
}

function renderCharts(period){
  const filtered = filterBets(globalBets, period);
  renderCountries(computeByCountry(filtered));
  renderOddsChart(computeByOdds(filtered));
}

/* ── period filter wiring ── */
document.getElementById('periodBar').addEventListener('click', e => {
  const btn = e.target.closest('[data-period]');
  if (!btn) return;
  currentPeriod = btn.dataset.period;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.toggle('active', b === btn));
  renderCharts(currentPeriod);
});

/* ── orchestration ── */
async function loadAll(){
  const btn        = document.getElementById('refreshBtn');
  const dot        = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const errorBanner= document.getElementById('errorBanner');

  btn.disabled = true;
  dot.className = 'dot';
  statusText.textContent = 'Loading…';
  errorBanner.className = 'errorBanner';

  try {
    const [mainRows, betsRows, openRows] = await Promise.all([
      fetchSheet(GIDS.main),
      fetchSheet(GIDS.bets),
      fetchSheet(GIDS.open)
    ]);

    const main            = parseMain(mainRows);
    const { bets, lastROI } = parseBets(betsRows);
    const open            = parseOpenBets(openRows);

    globalBets        = bets;
    globalMatchLookup = open.matchLookup;

    const computed = computeKPIs(bets);

    renderKPIs(main, computed, lastROI);
    renderHero(open);
    renderRecent(bets, open.matchLookup);
    renderCharts(currentPeriod);
    renderMisc(main);

    dot.className = 'dot live';
    statusText.textContent = `Live · updated ${new Date().toLocaleTimeString()}`;
  } catch (err) {
    dot.className = 'dot err';
    statusText.textContent = 'Failed to load';
    errorBanner.className = 'errorBanner show';
    errorBanner.innerHTML = `Could not load live data (${err.message}). This usually means the sheet isn't shared as
      "Anyone with the link can view", or the browser blocked the cross-origin request. Open the sheet directly to check:
      <a href="https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit" target="_blank" rel="noopener">open sheet</a>.`;
    console.error(err);
  } finally {
    btn.disabled = false;
  }
}

document.getElementById('refreshBtn').addEventListener('click', loadAll);
loadAll();
</script>
