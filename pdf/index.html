<body>
<!-- Laget av Mohibb Malik, 2026 -->

<div class="toprule">
  <a class="name" href="/">MOHIBB MALIK</a>
  <a class="back" href="/">&larr; All projects</a>
</div>

<div class="wrap">

  <div class="intro">
    <div class="eyebrow">Tools</div>
    <h1>PDF Merger</h1>
    <p class="lede">Combine, reorder, and split PDF files &mdash; entirely in your browser. Nothing is uploaded.</p>
  </div>

  <div class="card">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".pdf" multiple aria-label="Choose PDF files to merge">
      <div class="drop-icon">&#8593;</div>
      <p>Drop PDF files here or <span onclick="document.getElementById('fileInput').click()">browse</span></p>
      <p class="hint">Add as many files as you need &mdash; drag to reorder</p>
    </div>

    <div class="file-list" id="fileList"></div>
    <p class="empty-hint" id="emptyHint">Add at least 2 PDF files to merge.</p>

    <div class="actions">
      <button class="btn-merge" id="mergeBtn" type="button" disabled onclick="mergePDFs()">Merge PDFs</button>
      <button class="btn-clear" type="button" onclick="clearAll()">Clear all</button>
    </div>

    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="status" id="status"></div>
  </div>

  <footer>
    <span>&copy; <span id="year"></span> Mohibb Malik</span>
    <span><a href="/">mohibb.com</a></span>
  </footer>

</div>
