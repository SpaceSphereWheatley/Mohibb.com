name: validate

# Lightweight checks. Cloudflare Pages handles the deploy; this guards
# against breakages that are easy to ship silently:
#   1. invalid projects.json (breaks the whole landing page at runtime)
#   2. a syntax error in an inline <script> in any HTML file
#   3. invalid HTML markup
#   4. CSS errors/typos (stylelint, recommended ruleset)
#   5. basic accessibility regressions (pa11y, WCAG2A)
#
# All tooling is pulled on-demand via npx — the site itself stays
# dependency-free, no package.json/lockfile needed for the deploy.
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const { execSync } = require('child_process');
          const files = execSync('git ls-files "*.json"', { encoding: 'utf8' })
            .split('\n').filter(Boolean);
          let bad = 0;
          for (const f of files) {
            try { JSON.parse(fs.readFileSync(f, 'utf8')); console.log('ok   ' + f); }
            catch (e) { bad++; console.error('FAIL ' + f + ' — ' + e.message); }
          }
          if (bad) process.exit(1);
          if (!files.length) console.log('(no JSON files)');
          EOF

      - name: Syntax-check inline JS in HTML
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const { execSync } = require('child_process');
          const files = execSync('git ls-files "*.html"', { encoding: 'utf8' })
            .split('\n').filter(Boolean);
          const re = /<script\b([^>]*)>([\s\S]*?)<\/script>/gi;
          let bad = 0;
          for (const f of files) {
            const html = fs.readFileSync(f, 'utf8');
            let m, i = 0;
            while ((m = re.exec(html))) {
              const attrs = m[1], code = m[2];
              if (/\bsrc\s*=/.test(attrs)) continue;        // external script, nothing inline
              if (!code.trim()) continue;
              i++;
              const typeMatch = attrs.match(/\btype\s*=\s*["']?([^"'\s>]+)/i);
              const type = typeMatch ? typeMatch[1].toLowerCase() : '';
              if (type === 'application/ld+json' || type === 'application/json') {
                try { JSON.parse(code); console.log(`ok   ${f} [script #${i}] (JSON)`); }
                catch (e) { bad++; console.error(`FAIL ${f} [script #${i}] (JSON) — ${e.message}`); }
                continue;
              }
              if (type && type !== 'text/javascript' && type !== 'module' && type !== 'application/javascript') continue;
              try { new Function(code); console.log(`ok   ${f} [script #${i}]`); }
              catch (e) { bad++; console.error(`FAIL ${f} [script #${i}] — ${e.message}`); }
            }
          }
          if (bad) process.exit(1);
          if (!files.length) console.log('(no HTML files)');
          EOF

  html:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: html-validate
        run: npx --yes html-validate "**/*.html"

  css:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install stylelint (config extends need local node_modules)
        run: npm install --no-save stylelint postcss-html stylelint-config-recommended
      - name: stylelint (inline <style> blocks)
        run: npx stylelint --customSyntax postcss-html "**/*.html"

  accessibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Serve site
        run: npx --yes serve -l 8123 . &
      - name: Wait for server
        run: npx --yes wait-on http://localhost:8123/
      - name: pa11y-ci (WCAG2A)
        run: npx --yes pa11y-ci --config .pa11yci.json
